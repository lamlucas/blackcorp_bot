<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>BLACK CORP®</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg'/%3E" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="topbar-inner">
        <h1 class="neon-title" id="brandNeon">BLACK CORP®</h1>
      </div>
    </header>

    <main class="shell">
      <section id="gate" class="card gate" aria-live="polite">
        <h2 id="loginHeading">Welcome to Black Corp®</h2>
        <form id="loginForm" class="stack stack-loose">
          <label class="field">
            <span id="loginLabelUser">Admin</span>
            <input
              type="text"
              name="username"
              id="loginUsername"
              value="Black7777"
              autocomplete="username"
              required
              class="input rounded"
            />
          </label>
          <label class="field">
            <span id="loginLabelPass">Password</span>
            <input
              type="password"
              name="password"
              id="loginPassword"
              autocomplete="current-password"
              required
              class="input rounded"
            />
          </label>
          <div class="actions-centered">
            <button type="submit" class="btn primary" id="loginButton">Log In</button>
          </div>
          <p id="loginMsg" class="msg" hidden></p>
        </form>
      </section>

      <section id="app" class="hidden">
        <div class="app-tab-bar">
          <nav class="app-tabs" role="tablist" aria-label="Trang quản trị">
            <button
              type="button"
              role="tab"
              class="app-tab active"
              id="tabDealers"
              data-tab="dealers"
              aria-selected="true"
            >
              Đại lý &amp; Chat ID
            </button>
            <button type="button" role="tab" class="app-tab" id="tabChatFilter" data-tab="chat-filter" aria-selected="false">
              Lọc Chat ID
            </button>
            <button type="button" role="tab" class="app-tab" id="tabBroadcast" data-tab="broadcast" aria-selected="false">
              Gửi tin nhắn
            </button>
          </nav>
          <button type="button" class="btn ghost app-logout" id="logoutButton">Log Out</button>
        </div>

        <!-- Tab 1: Đại lý -->
        <div class="tab-panel" id="panel-dealers" data-panel="dealers" role="tabpanel">
          <section class="card section-panel">
            <header class="panel-head">
              <h2 id="dealerHeading">Đại lý &amp; Chat ID</h2>
              <p class="hint panel-intro" id="dealerHint">Nhập tên DL và Chat ID</p>
            </header>
            <div class="panel-block">
              <div id="dealerRows" class="dealer-rows"></div>
            </div>
            <div class="panel-block panel-actions-centered">
              <button type="button" class="btn ghost" id="dealerAddRow">+</button>
              <button type="button" class="btn primary" id="dealerSave">Save</button>
            </div>
            <p id="dealerMsg" class="msg panel-msg" hidden></p>
          </section>
        </div>

        <!-- Tab 2: Lọc Chat ID -->
        <div class="tab-panel" id="panel-chat-filter" data-panel="chat-filter" role="tabpanel" hidden>
          <section class="card section-panel">
            <header class="panel-head">
              <h2 id="chatFilterHeading">Lọc Chat ID</h2>
              <p class="hint panel-intro chat-id-fetch-hint" id="dealerFetchHint">
                Get Chat ID nhóm Telegram
              </p>
            </header>
            <div class="panel-block panel-actions-centered">
              <button type="button" class="btn primary" id="dealerFetchGroupChats">Get ID</button>
            </div>
            <div id="dealerChatResults" class="dealer-chat-results hidden">
              <label class="field">
                <span id="lblDealerChatFilter">Lọc theo tên nhóm hoặc Chat ID</span>
                <input
                  type="search"
                  id="dealerChatFilter"
                  class="input rounded"
                  autocomplete="off"
                  placeholder="Gõ để lọc…"
                />
              </label>
              <div class="chat-table-toolbar-centered">
                <button type="button" class="btn ghost btn-sm" id="dealerDownloadCsv">Tải CSV</button>
                <button type="button" class="btn ghost btn-sm" id="dealerDownloadTxt">Tải TXT</button>
              </div>
              <div class="chat-table-wrap">
                <table class="chat-table" id="dealerChatTable">
                  <thead>
                    <tr>
                      <th id="thChatTitle">Tên nhóm Telegram</th>
                      <th id="thChatUser">Username</th>
                      <th id="thChatId">Chat ID</th>
                      <th id="thChatAct">Thêm</th>
                    </tr>
                  </thead>
                  <tbody id="dealerChatTableBody"></tbody>
                </table>
              </div>
              <p class="hint chat-table-foot" id="dealerChatTableFoot">
                « Lấy Chat ID nhóm »
              </p>
            </div>
            <p id="chatFilterMsg" class="msg panel-msg" hidden></p>
          </section>
        </div>

        <!-- Tab 3: Gửi tin -->
        <div class="tab-panel" id="panel-broadcast" data-panel="broadcast" role="tabpanel" hidden>
          <section class="card section-panel broadcast-block">
            <header class="panel-head">
              <h2 id="sheetPayHeading">Send</h2>
              <p class="hint panel-intro" id="sheetPayHint">
                Điền xong hàng 2 trên mọi tab đại lý trong Google Sheet
              </p>
            </header>
            <div class="panel-block">
              <label class="field">
                <span id="lblSheetPayLink">LINK FILE</span>
                <input
                  type="url"
                  name="linkFile"
                  id="sheetPayLinkFile"
                  class="input rounded"
                  placeholder="https://..."
                  autocomplete="off"
                />
              </label>
            </div>
            <div class="panel-block panel-actions-centered">
              <button type="button" class="btn primary wide" id="sendSheetPayment">Send</button>
            </div>
            <p id="sheetPayMsg" class="msg panel-msg" hidden></p>
          </section>

          <section class="card section-panel broadcast-block">
            <header class="panel-head">
              <h2 id="formHeading">Send Broadcast</h2>
            </header>
            <form id="sendForm" class="stack stack-loose">
              <label class="field">
                <span id="lblNgay">Ngày</span>
                <input type="text" name="ngay" class="input rounded" required />
              </label>
              <label class="field">
                <span id="lblMcc">MCC</span>
                <input type="text" name="mcc" class="input rounded" required />
              </label>
              <label class="field">
                <span id="lblCamp">Mã camp</span>
                <input type="text" name="maCamp" class="input rounded" required />
              </label>
              <label class="field">
                <span id="lblRate">Rate</span>
                <input type="text" name="rate" class="input rounded" required />
              </label>
              <label class="field">
                <span id="lblRule">Rule</span>
                <textarea name="rule" rows="6" class="input rounded textarea"></textarea>
              </label>
              <div class="actions-centered">
                <button type="submit" class="btn primary" id="submitButton">Send</button>
              </div>
              <p id="sendMsg" class="msg" hidden></p>
            </form>
          </section>
        </div>

        <p class="hint app-footer" id="footerNote">Bot siêu cấp vip pro Blackcorp_bot</p>
      </section>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
