    </filter>
  </defs>
  <rect width="64" height="64" rx="14" fill="#0a0c12"/>
  <text
    x="32"
    y="43"
    text-anchor="middle"
    font-family="Segoe UI, system-ui, sans-serif"
    font-size="28"
