# Triển khai:
# 1) KV (bắt buộc), binding trong code là STORE:
#    - Lỗi API 10041 "namespace not found": ID KV không thuộc ĐÚNG tài khoản Cloudflare
#      đang deploy (Git CI ≠ tài khoản tạo KV trước đó). Tạo KV mới trong đúng account:
#      Workers & Pages → KV → Create namespace → copy Namespace ID (UUID).
#    - Tên Worker phải khớp project CI (ở đây: blackcorp-bot), khai báo ở name = bên dưới.
#    - Dán UUID vào [[kv_namespaces]].id → deploy. Hoặc Worker → Settings → Bindings → KV → STORE.
# 2) Chia sẻ Google Sheet cho sheetbot@... — Quyền Editor (để bot ghi cột H / TỔNG THU)
# 3) wrangler secret put TELEGRAM_BOT_TOKEN / GOOGLE_SERVICE_ACCOUNT_JSON / SESSION_SECRET / PASSWORD
#    Mật khẩu admin chỉ qua secret PASSWORD (Dashboard Cloudflare hoặc wrangler secret put)
#    GOOGLE_SERVICE_ACCOUNT_JSON = toàn bộ nội dung file JSON (một dòng hoặc newline trong secret)
# 4) Cập nhật PAYMENT_IMAGE_URL_1/2 (URL ảnh QR công khai HTTPS)
# 5) npm run deploy
# Gửi tin theo Sheet: chỉ khi ấn « Send Thanh Toán » trên web — không dùng cron.
#
# Bố cục mỗi tab đại lý (sheet chính): A1 = tiêu đề tin; B1 = chat_id nhóm;
# Hàng 2: A NGÀY | B MCC | C TỔNG TIÊU | D TIỀN TỆ | E QUY ĐỔI USD | F RATE | G TỔNG THU

name = "blackcorp-bot"
main = "src/index.ts"
compatibility_date = "2025-05-10"

[assets]
directory = "./public"
binding = "ASSETS"

[[kv_namespaces]]
binding = "STORE"
# Bắt buộc: UUID namespace KV tạo trong CÙNG tài khoản Cloudflare với repo (không dùng ID từ account khác)
id = "927d8f8c13b04cbaafa6a400299c1c3d"

[vars]
# Tài khoản admin mặc định (đổi được bằng biến này); mật khẩu chỉ qua secret PASSWORD
ADMIN_USERNAME = "Black7777"
# ID bảng chính (tab = tên đại lý, A1=tiêu đề, B1=chat_id, hàng 2 = dữ liệu)
MAIN_SPREADSHEET_ID = "1nATFl9dlTfsYgoHiqoG0j-kpJu2aRim7wMwm2BEQlsI"
# Tab CONG_NO trên cùng sheet chính (cột A = tên đại lý/trùng tên tab, B = nợ) — không dùng sheet khác
DEBT_TAB_NAME = "CONG_NO"
PAYMENT_IMAGE_URL_1 = "https://cdn.jsdelivr.net/gh/lamlucas/blackcorp_bot@main/TRC20.jpg"
PAYMENT_IMAGE_URL_2 = "https://cdn.jsdelivr.net/gh/lamlucas/blackcorp_bot@main/BEP20.jpg"
