# Triển khai:
# 1) KV (bắt buộc), binding trong code là STORE:
#    - Lỗi API 10041 "namespace not found": ID KV không thuộc ĐÚNG tài khoản Cloudflare
#      đang deploy (Git CI ≠ tài khoản tạo KV trước đó). Tạo KV mới trong đúng account:
#      Workers & Pages → KV → Create namespace → copy Namespace ID (UUID).
#    - Tên Worker phải khớp project CI (ở đây: blackcorp-bot), khai báo ở name = bên dưới.
#    - Dán UUID vào [[kv_namespaces]].id → deploy. Hoặc Worker → Settings → Bindings → KV → STORE.
# 2) Chia sẻ Google Sheet cho sheetbot@... — Quyền Editor (để bot ghi cột H / TỔNG THU)
# 3) wrangler secret put TELEGRAM_BOT_TOKEN / GOOGLE_SERVICE_ACCOUNT_JSON / SESSION_SECRET / PASSWORD
#    Mật khẩu admin chỉ qua secret PASSWORD (Dashboard Cloudflare hoặc wrangler secret put)
#    GOOGLE_SERVICE_ACCOUNT_JSON = toàn bộ nội dung file JSON (một dòng hoặc newline trong secret)
# 4) Cập nhật PAYMENT_IMAGE_URL_1 (URL ảnh QR công khai HTTPS, một ảnh)
# 5) Queue (khuyến nghị — tránh Worker chạy quá lâu):
#    wrangler queues create blackcorp-debt-notify
#    Deploy xong kiểm tra Worker → Triggers → có consumer queue.
#    Cron 22h VN: chỉ enqueue; consumer gửi Telegram, max_batch_size = 6 / lần + retry.
# 6) Bot Thu Chi (repo này) KHÔNG dùng webhook — chỉ getUpdates (cron 2 phút + « Lấy Chat ID »).
#    Nếu getUpdates báo conflict: deleteWebhook cho token bot Black Corp - Thu Chi:
#    https://api.telegram.org/bot<TOKEN_THU_CHI>/deleteWebhook?drop_pending_updates=true
#    Bot Báo cáo (repo baocao) dùng webhook riêng — token Telegram khác.
# 7) npm run deploy
# Cron: 22:00 Việt Nam (15:00 UTC). Tắt: DEBT_CRON_ENABLED = "0".
# DEBT_CRON_BATCH_* chỉ dùng khi không gắn Queue (fallback / wrangler dev).
#
# Sheet chi phí MAIN: tab TINH_TIEN1…TINH_TIEN9 — A1 tiêu đề; B1 = chat_id nhóm (hoặc map KV).
# Mỗi dòng từ 2: A NGÀY | B MCC | C TÀI KHOẢN | D TÊN KHÁCH (khớp CONG_NO cột A) | E RATE | F TỔNG TIÊU | G TIỀN TỆ | H QUY ĐỔI USD | I THỰC THU — bot ghi TỔNG THU vào cột J.

name = "blackcorp-bot"
main = "src/index.ts"
compatibility_date = "2025-05-10"

[triggers]
# getUpdates mỗi 2 phút (Thu: / CONG_NO) + 22:00 VN gửi công nợ
crons = ["*/2 * * * *", "0 15 * * *"]

[assets]
directory = "./public"
binding = "ASSETS"

[[queues.producers]]
binding = "DEBT_NOTIFY_QUEUE"
queue = "blackcorp-debt-notify"

[[queues.consumers]]
queue = "blackcorp-debt-notify"
max_batch_size = 6
max_batch_timeout = 30
max_retries = 5
# Một consumer một thời điểm → cập nhật KV tiến độ không bị ghi đè lẫn nhau
max_concurrency = 1

[[kv_namespaces]]
binding = "STORE"
# Bắt buộc: UUID namespace KV tạo trong CÙNG tài khoản Cloudflare với repo (không dùng ID từ account khác)
id = "927d8f8c13b04cbaafa6a400299c1c3d"

[vars]
# Tài khoản admin mặc định (đổi được bằng biến này); mật khẩu chỉ qua secret PASSWORD
ADMIN_USERNAME = "Black7777"
# ID bảng chi phí (tab TINH_TIEN1…9; form « Đại lý » map tên khách cột D → Chat ID; ô B1 không dùng cho bot)
MAIN_SPREADSHEET_ID = "1csArayeyFvAa6ag0EpP7W0TnJXREIbgHdT4foMyEXqg"
# ID bảng công nợ riêng (tab CONG_NO: cột A = mã/tên đại lý khớp « Tên đại lý » form KV, cột B = nợ)
# THEO DÕI TÀI KHOẢN + TÍNH TIỀN — tab CONG_NO
DEBT_SPREADSHEET_ID = "19ONokW6FyUFTX2RmIoGDJn8JmDeWlDsmT7AV_MN_SJM"
# Tên tab công nợ trong bảng công nợ
DEBT_TAB_NAME = "CONG_NO"
# Sheet THU_CHI (tab THU_CHI): A ngày | B Thu | C Chi | D ghi chú
THU_CHI_SPREADSHEET_ID = "1IikVlW74zW54b6b7n1a0ko0MxIQsr_qMH6IR9XNtXpE"
# Nhóm hub « Black Corp - Thu Chi »
TELEGRAM_THU_CHI_CHAT_ID = "-1003727898214"
PAYMENT_IMAGE_URL_1 = "https://cdn.jsdelivr.net/gh/lamlucas/blackcorp_bot@main/qr.jpg"
# Cron gửi công nợ tự động (đặt "0" để tắt)
DEBT_CRON_ENABLED = "1"
DEBT_CRON_BATCH_SIZE = "6"
DEBT_CRON_BATCH_PAUSE_MS = "4000"
# Tính KET_QUA (panel web): mặc định form — secret JSON (không để private_key trong file này):
#   wrangler secret put KET_QUA_DEFAULTS_JSON
# Khóa: spreadsheetUrlOrId, campaignCol, costCol, currencyCol, cap1Code, cap2Codes, accountNameCol, accountName (tùy chọn; API GET /api/ket-qua-defaults-json vẫn dùng được)
