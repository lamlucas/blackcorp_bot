<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BLACK CORP®</title>
    <style>
      :root { --bg:#090b16; --card:#131a33; --text:#e8edff; --accent:#1de9ff; --accent2:#ff3ecf; }
      * { box-sizing: border-box; }
      body { margin:0; min-height:100vh; font-family:Arial,sans-serif; color:var(--text); background:radial-gradient(circle at top,#101c45 0%,var(--bg) 45%); }
      .topbar { padding:22px 16px; text-align:center; font-size:32px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; color:#fff; text-shadow:0 0 8px var(--accent),0 0 16px var(--accent),0 0 30px var(--accent2); }
      .container { max-width:900px; margin:24px auto 50px; padding:24px; display:grid; gap:16px; }
      .card { background:rgba(19,26,51,.9); border:1px solid rgba(255,255,255,.12); border-radius:18px; padding:22px; box-shadow:0 12px 30px rgba(0,0,0,.35); }
      .top-tools { display:flex; justify-content:flex-end; margin-bottom:8px; }
      .grid { display:grid; gap:12px; }
      .grid-2 { display:grid; gap:12px; grid-template-columns:1fr 1fr; }
      label { display:block; margin-bottom:6px; font-size:14px; font-weight:600; }
      input, textarea { width:100%; border:1px solid rgba(255,255,255,.22); background:rgba(255,255,255,.06); color:#fff; border-radius:12px; padding:11px 13px; font-size:14px; outline:none; }
      input:focus, textarea:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(29,233,255,.22); }
      textarea { min-height:110px; resize:vertical; }
      button { border:0; border-radius:12px; background:linear-gradient(135deg,var(--accent),var(--accent2)); color:#fff; font-weight:700; font-size:14px; padding:10px 15px; cursor:pointer; }
      .btn-outline { background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.2); }
      .status { margin-top:10px; min-height:18px; font-size:14px; }
      .ok { color:#86ffbc; } .err { color:#ff9db9; }
      table { width:100%; border-collapse:collapse; margin-top:10px; font-size:13px; }
      th, td { border-bottom:1px solid rgba(255,255,255,.14); text-align:left; padding:8px; }
      .section-title { margin:0 0 8px; font-size:18px; }
      @media (max-width: 760px) { .grid-2 { grid-template-columns: 1fr; } }
    </style>
  </head>
  <body>
    <div class="topbar">BLACK CORP®</div>
    <div class="container">
      <div class="top-tools"><button id="logout-btn" class="btn-outline">Log Out</button></div>

      <div class="card">
        <h3 class="section-title">Chat ID</h3>
        <form id="group-form" class="grid-2">
          <div><label for="tabName">Name Tab</label><input id="tabName" name="tabName" placeholder="VD: Noi_Bo" required /></div>
          <div><label for="chatId">Chat ID</label><input id="chatId" name="chatId" placeholder="VD: -1003978420142" required /></div>
          <div><button type="submit">Save</button></div>
          <div><button type="button" id="reload-groups" class="btn-outline">Reload</button></div>
        </form>
        <div id="group-status" class="status"></div>
        <table>
          <thead><tr><th>Tab Name</th><th>Chat ID</th><th>Action</th></tr></thead>
          <tbody id="group-table-body"></tbody>
        </table>
      </div>

      <div class="card">
        <h3 class="section-title">Broadcast Messenger All Group</h3>
        <form id="broadcast-form" class="grid">
          <div><label for="ngay">NGÀY</label><input id="ngay" name="ngay" required /></div>
          <div><label for="mcc">MCC</label><input id="mcc" name="mcc" required /></div>
          <div><label for="maCamp">MÃ CAMP</label><input id="maCamp" name="maCamp" required /></div>
          <div><label for="rate">RATE</label><input id="rate" name="rate" required /></div>
          <div><label for="rule">RULE (mỗi dòng là 1 rule)</label><textarea id="rule" name="rule" required></textarea></div>
          <button type="submit">Send</button>
          <div id="broadcast-status" class="status"></div>
        </form>
      </div>
    </div>

    <script>
      const groupForm = document.getElementById("group-form");
      const groupStatus = document.getElementById("group-status");
      const groupTableBody = document.getElementById("group-table-body");
      const reloadBtn = document.getElementById("reload-groups");
      const logoutBtn = document.getElementById("logout-btn");
      const broadcastForm = document.getElementById("broadcast-form");
      const broadcastStatus = document.getElementById("broadcast-status");

      function setStatus(el, text, ok) {
        el.className = "status " + (ok ? "ok" : "err");
        el.textContent = text;
      }

      async function loadGroups() {
        const response = await fetch("/api/chat-groups");
        const result = await response.json();
        if (!response.ok || !result.ok) throw new Error(result.error || "Load group that bai");
        renderGroups(result.groups || []);
      }

      function renderGroups(groups) {
        if (!groups.length) {
          groupTableBody.innerHTML = "<tr><td colspan='3'>Chua co group nao</td></tr>";
          return;
        }
        groupTableBody.innerHTML = groups.map((group) => {
          const tab = (group.tabName || "").replace(/"/g, "&quot;");
          const id = (group.chatId || "").replace(/"/g, "&quot;");
          return "<tr><td>" + tab + "</td><td>" + id + "</td><td><button type='button' class='btn-outline del-group' data-chat-id='" + id + "'>Xoa</button></td></tr>";
        }).join("");
      }

      groupForm.addEventListener("submit", async (event) => {
        event.preventDefault();
        const formData = new FormData(groupForm);
        const payload = { tabName: formData.get("tabName"), chatId: formData.get("chatId") };
        const response = await fetch("/api/chat-groups", {
          method: "POST",
          headers: { "content-type": "application/json" },
          body: JSON.stringify(payload)
        });
        const result = await response.json();
        if (!response.ok || !result.ok) return setStatus(groupStatus, result.error || "Luu that bai", false);
        setStatus(groupStatus, "Da luu chat group", true);
        groupForm.reset();
        renderGroups(result.groups || []);
      });

      groupTableBody.addEventListener("click", async (event) => {
        const target = event.target;
        if (!target.classList.contains("del-group")) return;
        const chatId = target.getAttribute("data-chat-id");
        const response = await fetch("/api/chat-groups/" + encodeURIComponent(chatId), { method: "DELETE" });
        const result = await response.json();
        if (!response.ok || !result.ok) return setStatus(groupStatus, result.error || "Xoa that bai", false);
        setStatus(groupStatus, "Da xoa chat group", true);
        renderGroups(result.groups || []);
      });

      reloadBtn.addEventListener("click", async () => {
        try { await loadGroups(); setStatus(groupStatus, "Da tai lai", true); }
        catch (error) { setStatus(groupStatus, error.message, false); }
      });

      broadcastForm.addEventListener("submit", async (event) => {
        event.preventDefault();
        setStatus(broadcastStatus, "Dang gui...", true);
        const formData = new FormData(broadcastForm);
        const payload = {
          ngay: formData.get("ngay"),
          mcc: formData.get("mcc"),
          maCamp: formData.get("maCamp"),
          rate: formData.get("rate"),
          rule: formData.get("rule")
        };
        const response = await fetch("/api/broadcast", {
          method: "POST",
          headers: { "content-type": "application/json" },
          body: JSON.stringify(payload)
        });
        const result = await response.json();
        if (!response.ok || !result.ok) return setStatus(broadcastStatus, result.error || "Gui that bai", false);
        setStatus(broadcastStatus, "Thanh cong: " + result.sent + " nhom, that bai: " + result.failed + " nhom.", true);
        broadcastForm.reset();
      });

      logoutBtn.addEventListener("click", async () => {
        await fetch("/api/logout", { method: "POST" });
        window.location.href = "/login";
      });

      loadGroups().catch((error) => setStatus(groupStatus, error.message, false));
    </script>
  </body>
</html>
